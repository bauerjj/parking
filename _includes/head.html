<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.seo_title %}{{ page.seo_title }}{% else %}{{ site.title }} — Professional Parking Enforcement & CC&R Compliance in Phoenix, AZ{% endif %}</title>
  <meta name="description" content="{% if page.seo_description %}{{ page.seo_description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="keywords" content="{{ site.keywords }}">
  <meta name="robots" content="index, follow">
  <meta name="author" content="Desert Standards LLC">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.url }}">

  <!-- Geo / Local SEO -->
  <meta name="geo.region" content="US-AZ">
  <meta name="geo.placename" content="Phoenix">
  <meta name="geo.position" content="33.4484;-112.0740">
  <meta name="ICBM" content="33.4484, -112.0740">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/img/favicon.svg">
  <link rel="apple-touch-icon" href="{{ site.baseurl }}/img/icon-192.png">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.seo_title %}{{ page.seo_title }}{% else %}Desert Standards — Parking Enforcement & CC&R Compliance{% endif %}">
  <meta property="og:description" content="{% if page.seo_description %}{{ page.seo_description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | replace:'index.html','' | prepend: site.url }}">
  <meta property="og:image" content="{{ site.url }}/img/logo.png">
  <meta property="og:site_name" content="Desert Standards">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.seo_title %}{{ page.seo_title }}{% else %}Desert Standards — Parking Enforcement & CC&R Compliance{% endif %}">
  <meta name="twitter:description" content="{% if page.seo_description %}{{ page.seo_description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="twitter:image" content="{{ site.url }}/img/logo.png">

  <!-- Structured Data: LocalBusiness + Service -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "Desert Standards",
    "description": "{{ site.description | strip_newlines }}",
    "url": "{{ site.url }}",
    "telephone": "{{ site.footer.phone }}",
    "email": "{{ site.email }}",
    "image": "{{ site.url }}/img/logo.png",
    "logo": "{{ site.url }}/img/logo.png",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Phoenix",
      "addressRegion": "AZ",
      "addressCountry": "US"
    },
    "geo": {
      "@type": "GeoCoordinates",
      "latitude": 33.4484,
      "longitude": -112.0740
    },
    "areaServed": [
      {
        "@type": "City",
        "name": "Phoenix",
        "sameAs": "https://en.wikipedia.org/wiki/Phoenix,_Arizona"
      },
      {
        "@type": "City",
        "name": "Scottsdale",
        "sameAs": "https://en.wikipedia.org/wiki/Scottsdale,_Arizona"
      },
      {
        "@type": "City",
        "name": "Tempe",
        "sameAs": "https://en.wikipedia.org/wiki/Tempe,_Arizona"
      },
      {
        "@type": "City",
        "name": "Mesa",
        "sameAs": "https://en.wikipedia.org/wiki/Mesa,_Arizona"
      },
      {
        "@type": "City",
        "name": "Chandler",
        "sameAs": "https://en.wikipedia.org/wiki/Chandler,_Arizona"
      },
      {
        "@type": "City",
        "name": "Gilbert",
        "sameAs": "https://en.wikipedia.org/wiki/Gilbert,_Arizona"
      },
      {
        "@type": "City",
        "name": "Glendale",
        "sameAs": "https://en.wikipedia.org/wiki/Glendale,_Arizona"
      },
      {
        "@type": "City",
        "name": "Peoria",
        "sameAs": "https://en.wikipedia.org/wiki/Peoria,_Arizona"
      }
    ],
    "priceRange": "$$",
    "hasOfferCatalog": {
      "@type": "OfferCatalog",
      "name": "Compliance & Enforcement Services",
      "itemListElement": [
        {
          "@type": "Offer",
          "itemOffered": {
            "@type": "Service",
            "name": "Parking Enforcement",
            "description": "Professional parking enforcement for HOA communities, condos, and commercial properties. Fire lane monitoring, visitor parking enforcement, permit verification, and citation issuance without towing."
          }
        },
        {
          "@type": "Offer",
          "itemOffered": {
            "@type": "Service",
            "name": "CC&R Compliance Patrol",
            "description": "Licensed patrol officers conduct community inspections to identify and document CC&R violations including architectural, landscaping, common area, and parking infractions with photographic evidence."
          }
        },
        {
          "@type": "Offer",
          "itemOffered": {
            "@type": "Service",
            "name": "Property Compliance Monitoring",
            "description": "GPS-verified patrols with Axon body cameras and proprietary reporting software providing real-time visibility into every patrol, citation, and route for HOA boards and property managers."
          }
        }
      ]
    },
    "sameAs": []
  }
  </script>

  <!-- Structured Data: FAQPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "Do you tow vehicles?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No — Desert Standards does not tow. We focus on compliance through warnings and citations that drive long-term behavior change. If your community needs towing, we'll coordinate directly with your preferred towing company to ensure timely removal of repeat offenders and fire lane violators."
        }
      },
      {
        "@type": "Question",
        "name": "What areas do you serve?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "We serve HOA communities, condos, and commercial properties across the Phoenix metropolitan area — including Phoenix, Scottsdale, Tempe, Mesa, Chandler, Gilbert, Glendale, and Peoria."
        }
      },
      {
        "@type": "Question",
        "name": "Are your patrol officers licensed?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Every Desert Standards patrol officer is a licensed security guard through the Arizona Department of Public Safety (AZ DPS). This ensures professionalism, legal compliance, and accountability on every patrol."
        }
      },
      {
        "@type": "Question",
        "name": "How do you track patrol activity?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Every patrol is GPS-verified and recorded on Axon body cameras. Our proprietary software captures real-time route data, GPS snapshots every 10 minutes, and timestamped citation reports — all delivered to your inbox automatically after each patrol."
        }
      },
      {
        "@type": "Question",
        "name": "What happens to repeat offenders?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Our software automatically flags repeat offenders and tracks violation history by address. When a resident or vehicle accumulates multiple violations, we generate escalation-ready reports so your board can take meaningful action — whether that's fines, hearings, or coordinating a tow."
        }
      },
      {
        "@type": "Question",
        "name": "Do we need to sign a long-term contract?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. We offer flexible service agreements with no long-term commitments. We believe our results speak for themselves — if we're not delivering value, you're free to walk away."
        }
      },
      {
        "@type": "Question",
        "name": "How quickly can you start service?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Most communities are up and running within one to two weeks of signing. We'll conduct an initial property walkthrough, configure your community in our software, and begin scheduled patrols on your timeline."
        }
      }
    ]
  }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ site.baseurl }}/css/main.css">
</head>
